version: 2

# Strategy: keep dependency PRs few and safe.
# - **Ignore major** updates entirely — big framework bumps (Electron, TS, Vite,
#   ESLint, Vitest) are done as deliberate, separately-tested efforts, not
#   Dependabot PRs.
# - Group everything else (minor + patch) into ONE PR per ecosystem.
updates:
  # JavaScript/TypeScript (pnpm workspaces). One entry per package.json dir.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      js-root:
        patterns: ['*']

  - package-ecosystem: npm
    directory: '/apps/desktop'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      desktop-deps:
        patterns: ['*']

  - package-ecosystem: npm
    directory: '/apps/renderer'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      renderer-deps:
        patterns: ['*']

  # Go engine — majors are rare; group everything.
  - package-ecosystem: gomod
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ['*']

  # GitHub Actions used by our workflows — low risk; group everything.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
