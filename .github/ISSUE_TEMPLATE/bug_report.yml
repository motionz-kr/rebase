name: Bug report
description: Report something that isn't working
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Connect to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Connections / engine
        - Query editor / results grid
        - Schema / table editing
        - Redis
        - AI agent
        - Auto-update
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. 0.3.0 (see the title bar / About)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs or attach screenshots.
