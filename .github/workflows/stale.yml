name: Stale

# Nudge and eventually close inactive issues/PRs (security/pinned are exempt).
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'
          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed in 14 days
            if there is no further activity. Comment to keep it open.
          stale-pr-message: >
            This pull request has been inactive for 60 days and will be closed in 14
            days if there is no further activity. Comment or push to keep it open.
