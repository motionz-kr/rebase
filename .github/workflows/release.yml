name: Release

# Content-driven auto-release. On every push to main, release-please reads the
# conventional-commit history and maintains a "Release PR" (version bump +
# CHANGELOG). Merging that Release PR creates the tag + GitHub Release, which in
# the SAME run triggers the macOS + Windows build that attaches the installers
# and update metadata (latest*.yml). Doing both in one workflow avoids the
# GITHUB_TOKEN "no recursive workflow trigger" limitation.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs['apps/desktop--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
            goos: darwin
            goarch: arm64
          - os: windows-latest
            platform: win
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests (renderer + desktop)
        run: |
          pnpm --filter renderer test
          pnpm --filter desktop test

      - name: Build the Go engine
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: go build -o apps/desktop/bin/app-engine${{ matrix.platform == 'win' && '.exe' || '' }} ./engine/cmd/app-engine

      - name: Build renderer + desktop
        run: |
          pnpm --filter renderer build
          pnpm --filter desktop build

      - name: Package + publish (${{ matrix.platform }})
        working-directory: apps/desktop
        env:
          # The repo is public, so the built-in token can publish releases to it.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        shell: bash
        run: pnpm exec electron-builder --${{ matrix.platform }} --publish always
