name: Release

# Content-driven auto-release. On every push to main, release-please reads the
# conventional-commit history and maintains a "Release PR" (version bump +
# CHANGELOG). Merging that Release PR creates the tag + GitHub Release, which in
# the SAME run triggers the macOS + Windows build that attaches the installers
# and update metadata (latest*.yml). Doing both in one workflow avoids the
# GITHUB_TOKEN "no recursive workflow trigger" limitation.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs['.--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
            goos: darwin
            goarch: arm64
          - os: windows-latest
            platform: win
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8.15.9

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests (renderer + desktop)
        run: |
          pnpm --filter renderer test
          pnpm --filter desktop test

      - name: Build the Go engine
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: go build -ldflags="-s -w" -o apps/desktop/bin/app-engine${{ matrix.platform == 'win' && '.exe' || '' }} ./engine/cmd/app-engine

      - name: Build renderer + desktop
        run: |
          pnpm --filter renderer build
          pnpm --filter desktop build

      - name: Package (build only, no publish)
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        shell: bash
        # GitHub's macOS runners intermittently fail DMG creation with
        # "hdiutil: ... Device not configured" (a flaky disk-image subsystem,
        # not a code problem). Retry the build up to 3x, detaching any stale
        # Rebase DMG volume a failed attempt left mounted before retrying.
        run: |
          attempt=1; max=3
          until pnpm exec electron-builder --${{ matrix.platform }} --publish never; do
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::electron-builder (package) failed after $max attempts"; exit 1
            fi
            echo "::warning::electron-builder (package) attempt $attempt failed; cleaning up, retrying in 15s"
            if [ "${{ matrix.platform }}" = "mac" ]; then
              for v in $(ls /Volumes 2>/dev/null | grep -i '^Rebase' || true); do
                hdiutil detach "/Volumes/$v" -force 2>/dev/null || true
              done
            fi
            attempt=$((attempt + 1)); sleep 15
          done

      # Smoke-test the packaged app: launch it and fail if the main process
      # can't load a bundled module. This catches dependency-bundling regressions
      # (e.g. a transitive dep missing from the asar) that a plain build does not.
      - name: Smoke-test the packaged app (mac)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          APP="apps/desktop/release/mac-arm64/Rebase.app/Contents/MacOS/Rebase"
          "$APP" > /tmp/smoke.log 2>&1 &
          PID=$!
          sleep 12
          kill -9 "$PID" 2>/dev/null || true
          echo "--- app log ---"
          cat /tmp/smoke.log || true
          if grep -q "Cannot find module" /tmp/smoke.log; then
            echo "::error::Packaged app is missing a bundled module"
            exit 1
          fi
          echo "Smoke test passed: no missing modules"

      # Inject signing/notarization env only where it applies. CSC_LINK / CSC_KEY_PASSWORD
      # are generic (mac AND win) electron-builder vars; setting them to an EMPTY string
      # on Windows makes electron-builder treat "" as a bad cert path and fail
      # (`Env WIN_CSC_LINK is not correct, cannot resolve ...`). Empty != unset. So set
      # them via $GITHUB_ENV on mac only, and never set CSC_LINK on Windows (win stays
      # unsigned, as before). electron-builder auto-notarizes when APPLE_API_KEY{,_ID,_ISSUER}
      # are present. The multi-line base64 .p12 is written with the $GITHUB_ENV heredoc form.
      - name: Prepare signing env
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          MAC_APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          MAC_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            printf '%s\n' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/authkey.p8"
            {
              echo "APPLE_API_KEY=$RUNNER_TEMP/authkey.p8"
              echo "APPLE_API_KEY_ID=$MAC_APPLE_API_KEY_ID"
              echo "APPLE_API_ISSUER=$MAC_APPLE_API_ISSUER"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
              echo "CSC_IDENTITY_AUTO_DISCOVERY=true"
              echo "CSC_LINK<<__CSC_EOF__"
              printf '%s\n' "$MAC_CSC_LINK"
              echo "__CSC_EOF__"
            } >> "$GITHUB_ENV"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Publish (${{ matrix.platform }})
        working-directory: apps/desktop
        env:
          # The repo is public, so the built-in token can publish releases to it.
          # Signing/notarization vars come from the "Prepare signing env" step
          # ($GITHUB_ENV), set on mac only — never as empty strings on Windows.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        # Same hdiutil flakiness as the package step; retry. Re-uploading an asset
        # that a prior attempt already pushed is safe — electron-builder's GitHub
        # publisher overwrites an existing artifact (422 already_exists → delete +
        # re-upload), so a retry never hard-fails on a duplicate.
        run: |
          attempt=1; max=3
          until pnpm exec electron-builder --${{ matrix.platform }} --publish always; do
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::electron-builder (publish) failed after $max attempts"; exit 1
            fi
            echo "::warning::electron-builder (publish) attempt $attempt failed; cleaning up, retrying in 15s"
            if [ "${{ matrix.platform }}" = "mac" ]; then
              for v in $(ls /Volumes 2>/dev/null | grep -i '^Rebase' || true); do
                hdiutil detach "/Volumes/$v" -force 2>/dev/null || true
              done
            fi
            attempt=$((attempt + 1)); sleep 15
          done
