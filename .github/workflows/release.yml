name: Release

# Build the macOS app and attach the installers to a GitHub Release.
# Triggers on a version tag push (e.g. `v0.1.0`); also runnable manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  macos:
    runs-on: macos-14 # Apple Silicon → builds an arm64 .dmg
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9 # matches pnpm-lock.yaml (lockfile v6)

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests (renderer)
        run: pnpm --filter renderer test

      - name: Build the Go engine
        run: go build -o apps/desktop/bin/app-engine ./engine/cmd/app-engine

      - name: Build renderer + desktop
        run: |
          pnpm --filter renderer build
          pnpm --filter desktop build

      - name: Package with electron-builder (unsigned)
        working-directory: apps/desktop
        env:
          # No Apple Developer cert in CI → ad-hoc signed (runs locally; recipients
          # clear quarantine, or add signing secrets later to notarize).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm exec electron-builder --mac --publish never

      - name: Upload installers as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rebase-macos-arm64
          path: |
            apps/desktop/dist/installers/*.dmg
            apps/desktop/dist/installers/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/dist/installers/*.dmg
            apps/desktop/dist/installers/*.zip
          generate_release_notes: true
